
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>용인로타리클럽회원</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#121212">
    
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">

    <style>
        /* 전체 화면 설정 */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #121212; display: flex; flex-direction: column; }
        
        /* 상단 안내 문구 스타일 */
        .info-banner {
            background-color: #1e1e1e;
            color: #ffffff;
            padding: 12px 15px;
            text-align: center;
            font-size: 13px;
            line-height: 1.4;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            border-bottom: 1px solid #333333;
            z-index: 9999;
        }
        .info-banner strong { color: #ffd700; }

        /* 구글 스크립트 영역 */
        .app-container { flex: 1; width: 100%; height: 100%; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div class="info-banner">
        📱 홈 화면에 아이콘 추가 방법:<br>
        화면 오른쪽 <strong> [⋮] 버튼</strong> 현재페이지추가 <strong>[홈 화면]</strong>를 눌러주세요.
    </div>

    <div class="app-container">
        <iframe src="https://script.google.com/macros/s/AKfycbzntBpUEyEEEaYaF-rGVkJhm6O9h6O9LJqsEn-DzxcJSnoW1qUAl4PisbBEMkvBhEIF/exec?page=휴대폰메뉴"></iframe>
    </div>

    <script>
    // 1. 카카오톡 내장 브라우저 탈출 (삼성 인터넷 & 사파리 강제 전환)
    const userAgent = navigator.userAgent.toLowerCase();
    const isKakaoTalk = userAgent.includes('kakaotalk');

    if (isKakaoTalk) {
        const currentUrl = window.location.href.replace(/https?:\/\//, '');
        
        if (userAgent.includes('iphone') || userAgent.includes('ipad') || userAgent.includes('ipod')) {
            // 🍏 아이폰: 사파리(기본 브라우저)로 외부 열기 호출
            window.location.href = 'kakaotalk://web/openExternal?url=' + encodeURIComponent(window.location.href);
        } else {
            // 📱 안드로이드: 삼성 인터넷 강제 실행 패키지명 적용
            window.location.href = 'intent://' + currentUrl + '#Intent;scheme=https;package=com.sec.android.app.sbrowser;end';
        }
    }

    // 2. 설치 팝업 가로채기 (삼성 인터넷/크롬 대응)
    let deferredPrompt;

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        
        // 사용자가 화면을 처음 터치할 때 설치 팝업 실행
        document.body.addEventListener('click', function triggerInstall() {
            if (deferredPrompt) {
                deferredPrompt.prompt(); 
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        console.log('User accepted the install prompt');
                    }
                    deferredPrompt = null;
                });
            }
            document.body.removeEventListener('click', triggerInstall);
        });
    });

    // 3. PWA 서비스 워커 등록
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => console.log('서비스 워커 등록 성공:', reg.scope))
                .catch(err => console.log('서비스 워커 등록 실패:', err));
        });
    }
</script>
</body>
</html>
